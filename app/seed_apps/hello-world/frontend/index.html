<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Hello World</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #fafafa;
      color: #333;
    }
    h1 { color: #EE3424; margin-top: 0; }
    pre {
      background: #fff;
      border: 1px solid #eee;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      overflow: auto;
    }
    button {
      background: #EE3424;
      color: white;
      border: 0;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    .muted { color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <h1>👋 Hello World</h1>
  <p id="greeting" class="muted">Ожидаем инициализации…</p>

  <h3>Контекст приложения</h3>
  <pre id="context">—</pre>

  <h3>Последние 5 запусков workspace</h3>
  <pre id="runs">Нажмите «Загрузить запуски»</pre>
  <button id="load-runs">Загрузить запуски</button>

  <p class="muted" style="margin-top: 24px;">
    Это эталонное приложение. Смотрите исходник в репозитории backend,
    папка <code>app/seed_apps/hello-world/</code>.
  </p>

<script>
  // The host posts us an installation token once on load.
  // We echo everything back to demonstrate the API bridge.
  let token = null;
  let apiBase = null;

  function log(id, obj) {
    document.getElementById(id).textContent =
      typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  }

  window.addEventListener("message", async (evt) => {
    if (!evt.data || evt.data.type !== "markov.bootstrap") return;
    token = evt.data.token;
    apiBase = evt.data.apiBase ?? "";
    document.getElementById("greeting").textContent = "Токен получен. Проверяем контекст…";

    const resp = await fetch(apiBase + "/api/apps/me/context", {
      headers: { Authorization: "Bearer " + token },
    });
    const ctx = await resp.json();
    log("context", ctx);

    // Show configured greeting from settings, if any
    if (ctx.settings?.greeting) {
      document.getElementById("greeting").textContent = ctx.settings.greeting;
    }
  });

  document.getElementById("load-runs").onclick = async () => {
    if (!token) {
      log("runs", "Токен не получен");
      return;
    }
    const ctxResp = await fetch(apiBase + "/api/apps/me/context", {
      headers: { Authorization: "Bearer " + token },
    });
    const ctx = await ctxResp.json();
    const resp = await fetch(
      apiBase + "/api/runs?workspace_id=" + ctx.workspace_id,
      { headers: { Authorization: "Bearer " + token } },
    );
    const data = await resp.json();
    log("runs", Array.isArray(data) ? data.slice(0, 5) : data);
  };

  // Ask the parent for bootstrap — it may have been posted before we
  // registered the listener.
  window.parent.postMessage({ type: "markov.ready" }, "*");
</script>
</body>
</html>
