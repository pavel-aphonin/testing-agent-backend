# Alembic configuration for testing-agent-backend.
#
# The sqlalchemy.url is intentionally left blank below — `alembic/env.py`
# reads it from `app.config.settings.database_url` so there's exactly
# one source of truth for the DB connection string across the backend
# (lifespan, CRUD code, and migrations).

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

# Cross-platform version file path separator. `os` uses the host OS's
# native separator; works under Docker Linux and macOS.
version_path_separator = os

# Filenames become  20260408_1430_initial_schema.py — chronological
# without relying on ordering by hash.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
